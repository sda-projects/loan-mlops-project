name: CI Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          from pathlib import Path

          raw = Path("requirements.txt").read_bytes()

          text = None
          for enc in ("utf-8", "utf-8-sig", "utf-16", "utf-16-le", "utf-16-be"):
              try:
                  text = raw.decode(enc)
                  break
              except UnicodeDecodeError:
                  pass

          if text is None:
              raise ValueError("Could not decode requirements.txt")

          blocked_prefixes = (
              "pywin32",
              "contourpy",
              "ipython",
              "ipykernel",
              "jupyter_client",
              "jupyter_core",
              "matplotlib-inline",
              "comm",
              "debugpy",
              "pexpect",
              "ptyprocess",
              "pyzmq",
              "traitlets",
              "prompt_toolkit",
              "stack-data",
              "asttokens",
              "pure_eval",
              "executing",
              "decorator",
              "ipython_pygments_lexers",
          )

          filtered = []
          for line in text.splitlines():
              stripped = line.strip()
              if not stripped or stripped.startswith("#"):
                  filtered.append(line)
                  continue
              if stripped.startswith(blocked_prefixes):
                  continue
              filtered.append(line)

          Path("requirements-ci.txt").write_text("\n".join(filtered) + "\n", encoding="utf-8")
          PY
          python -m pip install -r requirements-ci.txt
          python -m pip install pytest

      - name: Verify key packages
        run: |
          python -c "import pandas; print('pandas OK')"
          python -c "import sklearn; print('scikit-learn OK')"

      - name: Create folders
        run: |
          mkdir -p data/processed

      - name: Run preprocessing
        run: |
          python preprocessing.py

      - name: Run tests
        run: |
          python -m pytest tests/